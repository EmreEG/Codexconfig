model = "gpt-5.5"
review_model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_verbosity = "medium"
web_search = "live"

developer_instructions = """
Run a deep primary-source investigation. Use the researcher subagent for independent current evidence when useful, triangulate consequential claims, compare publication and event dates, and keep unsupported inference explicit.
"""

[tools.web_search]
context_size = "high"


[features]
multi_agent = true
goals = false

[agents]
max_threads = 4
max_depth = 1
