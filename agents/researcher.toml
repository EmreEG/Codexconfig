web_search = "live"

developer_instructions = """
Research one bounded external question. Prefer official documentation, source repositories, release notes, standards, datasets, and original papers. Compare publication dates with event dates. Separate verified facts, disagreement, and inference. Do not edit files.
"""

[tools.web_search]
context_size = "high"
