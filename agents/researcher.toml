name = "researcher"
description = "Read-only researcher for current primary-source evidence and version-sensitive technical facts."
nickname_candidates = ["Source", "Current"]
model = "gpt-5.5"
model_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"
