#:schema https://developers.openai.com/codex/config-schema.json

# Intelligence-first default.
model = "gpt-5.5"
review_model = "gpt-5.5"
personality = "none"

model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"
model_verbosity = "medium"

allow_login_shell = true
check_for_update_on_startup = true
background_terminal_max_timeout = 300000

# Preserve the user's existing unrestricted execution policy.
sandbox_mode = "danger-full-access"
approval_policy = { granular = { sandbox_approval = false, rules = true, mcp_elicitations = false, request_permissions = true, skill_approval = true } }
approvals_reviewer = "user"

project_doc_max_bytes = 32768
project_doc_fallback_filenames = []
tool_output_token_limit = 12000
web_search = "live"

[analytics]
enabled = false

[feedback]
enabled = false

[history]
max_bytes = 33554432

[tools]
view_image = true

[tools.web_search]
context_size = "high"

[features]
apps = false
plugins = false
plugin_sharing = false
workspace_dependencies = false
tool_suggest = false
browser_use = false
browser_use_external = false
browser_use_full_cdp_access = false
computer_use = false
in_app_browser = false
image_generation = false
hooks = true
goals = true
skill_mcp_dependency_install = false
personality = false
multi_agent = true
guardian_approval = false
tool_call_mcp_elicitation = false
shell_snapshot = true
shell_tool = true
unified_exec = true
fast_mode = true
enable_request_compression = true
prevent_idle_sleep = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[tui]
animations = false
show_tooltips = false

# Keep the ordinary skill list empty. Focused profiles enable only relevant skills.
[[skills.config]]
path = "/home/emre/.codex/skills/.system/imagegen/SKILL.md"
enabled = false

