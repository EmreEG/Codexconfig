interface:
  display_name: "Stage Review"
  short_description: "Commit locally, then run no-mistakes review"
  default_prompt: "Use $stage-review to stage this finished feature, create a Conventional Commit, and run it through no-mistakes."
description: >
  Use only when explicitly requested for a finished-feature,
  release-sensitive, gated commit/review/push workflow.
policy:
  allow_implicit_invocation: true